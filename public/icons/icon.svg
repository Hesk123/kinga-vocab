<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Book icon -->
  <g transform="translate(256,256) scale(0.45)" stroke="white" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book body -->
    <path d="M-120,140 L-120,-120 Q-120,-160 -80,-160 L100,-160 L100,120 L-80,120 Q-120,120 -120,140 Z" fill="white" fill-opacity="0.15"/>
    <path d="M-120,140 L-120,-120 Q-120,-160 -80,-160 L100,-160 L100,120 L-80,120 Q-120,120 -120,140 Z"/>
    <!-- Book spine fold -->
    <path d="M-80,120 Q-120,120 -120,140 Q-120,160 -80,160 L100,160 L100,120"/>
    <!-- Text lines on book -->
    <line x1="-60" y1="-100" x2="40" y2="-100" stroke-width="12"/>
    <line x1="-60" y1="-60" x2="20" y2="-60" stroke-width="12"/>
    <line x1="-60" y1="-20" x2="50" y2="-20" stroke-width="12"/>
    <!-- Small bookmark -->
    <path d="M60,-160 L60,-100 L75,-115 L90,-100 L90,-160" fill="white" fill-opacity="0.3" stroke="none"/>
  </g>
</svg>
